name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build L1 status app
        working-directory: artifacts/l1-status-app
        run: pnpm exec expo export -p web --output-dir dist
        env:
          EXPO_BASE_URL: /${{ github.event.repository.name }}

      - name: Inject PWA manifest + service worker registration
        run: |
          sed -i 's|</head>|<link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon-192.png"><meta name="theme-color" content="#2f81f7"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="L1 Status"><script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js");</script></head>|' artifacts/l1-status-app/dist/index.html

      - name: Copy index.html to 404.html for SPA routing
        run: cp artifacts/l1-status-app/dist/index.html artifacts/l1-status-app/dist/404.html

      - name: Build Admin Dashboard
        working-directory: artifacts/admin-dashboard
        run: pnpm run build
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: /${{ github.event.repository.name }}/Admin-dashboard/
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Copy Admin Dashboard into Pages output
        run: |
          mkdir -p artifacts/l1-status-app/dist/Admin-dashboard
          cp -r artifacts/admin-dashboard/dist/public/. artifacts/l1-status-app/dist/Admin-dashboard/
          cp artifacts/admin-dashboard/dist/public/index.html artifacts/l1-status-app/dist/Admin-dashboard/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/l1-status-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
